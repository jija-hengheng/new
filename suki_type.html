<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌶️ เลือกประเภทสุกี้/หม่าล่า</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #940109;
            --bg-cream: #f1e9d9;
            --card-white: #ffffff;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-cream);
            color: #333;
            margin: 0;
            padding: 10px;
            padding-bottom: 100px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-red);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .soup-card {
            background: var(--card-white);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
            border: 2px solid transparent; 
            transition: 0.2s;
            cursor: pointer;
        }

        .soup-card input[type="radio"][name="soup"] {
            position: absolute;
            opacity: 0;
        }

        .soup-card:has(input[name="soup"]:checked) {
            border-color: var(--primary-red);
            background-color: #fff9f9;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background-color: #eee;
        }

        .item-info {
            padding: 10px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--primary-red);
            margin-bottom: 4px;
            min-height: 2.4em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-price {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 8px;
            color: #333;
        }

        .spicy-container {
            display: none; 
            border-top: 1px solid #eee;
            padding-top: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            animation: fadeIn 0.3s ease;
        }

        .spicy-title {
            font-size: 0.8rem;
            color: #940109;
            margin-bottom: 5px;
            width: 100%;
            font-weight: 500;
        }

        .soup-card:has(input[name="soup"]:checked) .spicy-container {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spicy-option {
            font-size: 0.75rem;
            padding: 4px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            background: #fff;
            transition: 0.2s;
        }

        .spicy-container input[type="radio"]:checked + .spicy-option {
            background-color: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .footer-fixed {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        .btn-confirm {
            pointer-events: auto;
            background-color: var(--primary-red);
            color: white;
            border: 2px solid #fff;
            padding: 12px 25px;
            border-radius: 12px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌶️ เลือกประเภทเมนู</h1>
        <p class="subtitle">เลือกน้ำซุปหรือรูปแบบที่ต้องการ</p>

        <div class="menu-grid">
            <label class="soup-card">
                <input type="radio" name="soup" id="s9" value="หม่าล่าผัดแห้ง">
                <img src="images/mala-h.jpg" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Mala+Dry+Stir-fry'">
                <div class="item-info">
                    <div class="item-name">หม่าล่าผัดแห้ง</div>
                    <div class="item-price">+19฿</div>
                    <div class="spicy-container">
                        <div class="spicy-title">🌶️ เลือกระดับความเผ็ด</div>
                        <input type="radio" name="spice_s9" id="s9_l1" value="เผ็ดน้อย" style="display:none">
                        <label for="s9_l1" class="spicy-option">น้อย</label>
                        <input type="radio" name="spice_s9" id="s9_l2" value="เผ็ดกลาง" style="display:none" checked>
                        <label for="s9_l2" class="spicy-option">กลาง</label>
                        <input type="radio" name="spice_s9" id="s9_l3" value="เผ็ดมาก" style="display:none">
                        <label for="s9_l3" class="spicy-option">มาก</label>
                    </div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s7" value="ซุปหม่าล่ากระดูกหมู">
                <img src="images/Zgml.png" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Mala+Pork'">
                <div class="item-info">
                    <div class="item-name">ซุปหม่าล่ากระดูกหมู</div>
                    <div class="item-price">+29฿</div>
                    <div class="spicy-container">
                        <div class="spicy-title">🌶️ เลือกระดับความเผ็ด</div>
                        <input type="radio" name="spice_s7" id="s7_l1" value="เผ็ดน้อย" style="display:none">
                        <label for="s7_l1" class="spicy-option">น้อย</label>
                        <input type="radio" name="spice_s7" id="s7_l2" value="เผ็ดกลาง" style="display:none" checked>
                        <label for="s7_l2" class="spicy-option">กลาง</label>
                        <input type="radio" name="spice_s7" id="s7_l3" value="เผ็ดมาก" style="display:none">
                        <label for="s7_l3" class="spicy-option">มาก</label>
                    </div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s8" value="ซุปกระดูกหมูน้ำดำ">
                <img src="images/zgnd.png" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Pork+Black'">
                <div class="item-info">
                    <div class="item-name">ซุปกระดูกหมูน้ำดำ</div>
                    <div class="item-price">+29฿</div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s1" value="ซุปหม่าล่าน้ำข้น">
                <img src="images/soup_mala_milk.jpg" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Mala+Milk'">
                <div class="item-info">
                    <div class="item-name">ซุปหม่าล่าน้ำข้น</div>
                    <div class="item-price">+29฿</div>
                    <div class="spicy-container">
                        <div class="spicy-title">🌶️ เลือกระดับความเผ็ด</div>
                        <input type="radio" name="spice_s1" id="s1_l1" value="เผ็ดน้อย" style="display:none">
                        <label for="s1_l1" class="spicy-option">น้อย</label>
                        <input type="radio" name="spice_s1" id="s1_l2" value="เผ็ดกลาง" style="display:none" checked>
                        <label for="s1_l2" class="spicy-option">กลาง</label>
                        <input type="radio" name="spice_s1" id="s1_l3" value="เผ็ดมาก" style="display:none">
                        <label for="s1_l3" class="spicy-option">มาก</label>
                    </div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s2" value="ซุปหม่าล่าน้ำดำ">
                <img src="images/soup_mala_black.jpg" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Mala+Black'">
                <div class="item-info">
                    <div class="item-name">ซุปหม่าล่าน้ำดำ</div>
                    <div class="item-price">+29฿</div>
                    <div class="spicy-container">
                        <div class="spicy-title">🌶️ เลือกระดับความเผ็ด</div>
                        <input type="radio" name="spice_s2" id="s2_l1" value="เผ็ดน้อย" style="display:none">
                        <label for="s2_l1" class="spicy-option">น้อย</label>
                        <input type="radio" name="spice_s2" id="s2_l2" value="เผ็ดกลาง" style="display:none" checked>
                        <label for="s2_l2" class="spicy-option">กลาง</label>
                        <input type="radio" name="spice_s2" id="s2_l3" value="เผ็ดมาก" style="display:none">
                        <label for="s2_l3" class="spicy-option">มาก</label>
                    </div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s3" value="ซุปหม่าล่าดั้งเดิม">
                <img src="images/soup_mala_orig.jpg" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Mala+Original'">
                <div class="item-info">
                    <div class="item-name">ซุปหม่าล่าดั้งเดิม</div>
                    <div class="item-price">+19฿</div>
                    <div class="spicy-container">
                        <div class="spicy-title">🌶️ เลือกระดับความเผ็ด</div>
                        <input type="radio" name="spice_s3" id="s3_l1" value="เผ็ดน้อย" style="display:none">
                        <label for="s3_l1" class="spicy-option">น้อย</label>
                        <input type="radio" name="spice_s3" id="s3_l2" value="เผ็ดกลาง" style="display:none" checked>
                        <label for="s3_l2" class="spicy-option">กลาง</label>
                        <input type="radio" name="spice_s3" id="s3_l3" value="เผ็ดมาก" style="display:none">
                        <label for="s3_l3" class="spicy-option">มาก</label>
                    </div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s4" value="ซุปน้ำดำ">
                <img src="images/soup_black.jpg" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Black+Soup'">
                <div class="item-info">
                    <div class="item-name">ซุปน้ำดำ</div>
                    <div class="item-price">+19฿</div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s5" value="ซุปกระดูกหมู">
                <img src="images/soup_pork.jpg" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Pork+Bone+Soup'">
                <div class="item-info">
                    <div class="item-name">ซุปกระดูกหมู</div>
                    <div class="item-price">+19฿</div>
                </div>
            </label>

            <label class="soup-card">
                <input type="radio" name="soup" id="s6" value="สุกี้แห้ง">
                <img src="images/hang.png" class="item-image" onerror="this.src='https://via.placeholder.com/150?text=Suki+Dry'">
                <div class="item-info">
                    <div class="item-name">สุกี้แห้ง</div>
                    <div class="item-price">+10฿</div>
                </div>
            </label>
        </div>
    </div>

    <div class="footer-fixed">
        <button class="btn-confirm" onclick="goToToppings()">เลือกท็อปปิ้งต่อ ➡️</button>
    </div>

    <script>
        function goToToppings() {
            const selected = document.querySelector('input[name="soup"]:checked');
            if (!selected) return alert('กรุณาเลือกเมนู');

            const soupId = selected.id;
            const soupName = selected.value;
            const priceText = selected.parentElement.querySelector('.item-price').innerText;
            const price = parseInt(priceText.replace('+', '').replace('฿', '')) || 0;
            
            let spice = 'ปกติ';
            const spiceSelected = document.querySelector(`input[name="spice_${soupId}"]:checked`);
            if (spiceSelected) spice = spiceSelected.value;

            const sukiDetails = { name: soupName, price: price, spice: spice };
            sessionStorage.setItem('sukiMainItem', JSON.stringify(sukiDetails));
            window.location.href = 'topping_suki.html';
        }
    </script>
</body>
</html>
