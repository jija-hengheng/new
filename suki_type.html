    <style>
        .soup-card {
            background: var(--card-white);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 16px rgba(43,28,18,0.08);
            position: relative;
            border: 2px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }
        .soup-card input[type="radio"][name="soup"] { position: absolute; opacity: 0; }
        .soup-card:has(input[name="soup"]:checked) { border-color: var(--primary-red); background-color: #fff9f9; }

        .item-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: #eee; }
        .item-info { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-weight: 500; font-size: 0.88rem; color: var(--primary-red); margin-bottom: 4px; min-height: 2.4em; display: flex; align-items: center; justify-content: center; }
        .item-price { font-weight: 700; font-size: 1rem; margin-bottom: 8px; color: var(--ink); }

        .spicy-container { display: none; border-top: 1px dashed rgba(148,1,9,0.2); padding-top: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; gap: 6px; animation: fadeIn 0.3s ease; }
        .spicy-title { font-size: 0.78rem; color: var(--primary-red); margin-bottom: 5px; width: 100%; font-weight: 500; }
        .soup-card:has(input[name="soup"]:checked) .spicy-container { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .spicy-option { font-size: 0.72rem; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; transition: 0.2s; }
        .spicy-container input[type="radio"]:checked + .spicy-option { background-color: var(--primary-red); color: white; border-color: var(--primary-red); }

        .footer-fixed { position: fixed; bottom: 0; left: 0; width: 100%; padding: 14px; display: flex; justify-content: center; z-index: 1000; background: var(--cream-soft); border-top: 2px solid var(--gold); box-shadow: 0 -6px 20px rgba(0,0,0,0.1); }

        .soup-card.locked { opacity: 0.45; filter: grayscale(70%); pointer-events: none; position: relative; }
        .soup-card.locked::after {
            content: "ไม่รองรับหม้อไฟ";
            position: absolute; top: 6px; left: 6px;
            background: rgba(44,28,18,0.8); color: #fff;
            font-size: 0.6rem; font-weight: 600;
            padding: 3px 8px; border-radius: 20px;
        }
    </style>

    <script>
        // ถ้ามาจาก Flow หม้อไฟ (ทานที่ร้าน) ให้ปิดการใช้งานเมนูที่ไม่เหมาะกับการต้ม/ลวกเอง
        // (หม่าล่าผัดแห้ง, สุกี้แห้ง, หม่าล่าปั้น (ย่าง)) โดยแสดงเป็นสีเทา กดไม่ได้
        function applyHotpotLocks() {
            if (sessionStorage.getItem('orderFlow') !== 'HOTPOT') return;
            const lockedIds = ['s9', 's6', 's10']; // หม่าล่าผัดแห้ง, สุกี้แห้ง, หม่าล่าปั้น (ย่าง)
            lockedIds.forEach(id => {
                const input = document.getElementById(id);
                if (!input) return;
                input.disabled = true;
                input.closest('.soup-card').classList.add('locked');
            });
        }

        function goToToppings() {
            const selected = document.querySelector('input[name="soup"]:checked');
            if (!selected) return alert('กรุณาเลือกเมนู');

            const soupId = selected.id;
            const soupName = selected.value;
            let soupSku = selected.dataset.sku || '';
            const priceText = selected.parentElement.querySelector('.item-price').innerText;
            const price = parseInt(priceText.replace('+', '').replace('฿', '')) || 0;
            
            let spice = 'ปกติ';
            let spiceSku = '';
            const spiceSelected = document.querySelector(`input[name="spice_${soupId}"]:checked`);
            if (spiceSelected) {
                spice = spiceSelected.value;
                spiceSku = spiceSelected.dataset.sku || '';
                soupSku = spiceSku;
            }

            const sukiDetails = { name: soupName, price: price, sku: soupSku, spice: spice, spiceSku: spiceSku };
            sessionStorage.setItem('sukiMainItem', JSON.stringify(sukiDetails));
            window.location.href = 'topping_suki.html';
        }

        document.addEventListener('DOMContentLoaded', applyHotpotLocks);
    </script>
