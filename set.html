<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จิจะ เฮงเฮง - เลือกเมนู</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        body { padding-bottom: 110px; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 600px; margin: 0 auto 20px; padding: 0 4px; }
        .menu-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 16px rgba(43,28,18,0.08); display: flex; flex-direction: column; }
        .menu-card:active { transform: scale(0.97); }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .name { font-weight: 500; font-size: 0.86rem; margin-bottom: 5px; height: 2.4em; overflow: hidden; color: var(--ink); }
        .price { color: var(--primary-red); font-weight: 700; font-size: 1.02rem; margin-bottom: 8px; }
        .select-btn { background: var(--primary-red); color: white; border: none; padding: 8px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; }

        .sauce-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .sauce-card .name { font-size: 0.66rem; height: 2.8em; }
        .sauce-card .price { font-size: 0.8rem; }
        .sauce-card .select-btn { background: var(--gold); color: #3a2a00; font-size: 0.72rem; padding: 5px; }

        .modal-header { font-family: 'Noto Serif Thai', serif; color: var(--primary-red); font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; border-bottom: 1px dashed rgba(148,1,9,0.2); padding-bottom: 10px; }
        .opt-group { margin-bottom: 15px; }
        .opt-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--ink-soft); }
        .soup-list { display: flex; flex-direction: column; gap: 8px; }
        .option-item { padding: 10px 15px; border: 1.5px solid #eee; border-radius: 10px; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .option-item.active { border-color: var(--primary-red); background: #fff5f5; color: var(--primary-red); font-weight: 600; }
        .spicy-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .spicy-item { padding: 8px; border: 1.5px solid #eee; border-radius: 10px; text-align: center; font-size: 0.85rem; }
        .spicy-item.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }

        .cart-bar {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: linear-gradient(155deg, var(--primary-red), var(--dark-red)); color: var(--cream-soft);
            padding: 15px 25px; border-radius: 50px; display: flex; justify-content: space-between;
            text-decoration: none; box-shadow: 0 10px 25px rgba(148,1,9,0.4); z-index: 1000;
            border: 2px solid var(--gold-soft);
        }
    </style>
</head>
<body class="themed">

    <div class="mini-header">
        <a href="index.html" class="back-btn">←</a>
        <img src="images/2.png" class="mini-logo" alt="จิจะเฮงเฮง">
        <div>
            <div class="mini-title">🏮 ชุดเซตสุดคุ้ม</div>
            <div class="mini-sub">รวมชุดสุดฮิต อิ่มจุใจ</div>
        </div>
    </div>

    <div class="t-container" style="padding-top: 12px;">
        <div class="t-section-label">เลือกเมนูชุดเซต</div>
        <div class="menu-grid" id="main-menu"></div>

        <div class="t-section-label">เพิ่มน้ำจิ้ม</div>
        <div class="menu-grid sauce-grid" id="sauce-menu"></div>
    </div>

    <div class="t-modal center" id="soup-modal">
        <div class="t-modal-sheet">
            <div class="modal-header" id="modal-item-name">ชื่อเมนู</div>
            
            <div class="opt-group">
                <div class="opt-title">1. เลือกน้ำซุป</div>
                <div class="soup-list" id="soup-options">
                    </div>
            </div>

            <div class="opt-group" id="spicy-group" style="display:none;">
                <div class="opt-title">2. ระดับความเผ็ด</div>
                <div class="spicy-list">
                    <div class="spicy-item active" onclick="setSpicy('น้อย', this)">น้อย</div>
                    <div class="spicy-item" onclick="setSpicy('กลาง', this)">กลาง</div>
                    <div class="spicy-item" onclick="setSpicy('มาก', this)">มาก</div>
                </div>
            </div>

            <button class="t-btn-primary" style="width:100%;" onclick="confirmSelection()">ยืนยันเพิ่มลงตะกร้า</button>
            <button class="t-btn-ghost" style="width:100%; margin-top:10px;" onclick="closeModal()">ยกเลิก</button>
        </div>
    </div>

    <div class="t-toast" id="toast">เพิ่มลงตะกร้าแล้ว!</div>

    <a href="summary.html" class="cart-bar">
        <span style="font-weight:600;">🛒 ตะกร้าของฉัน</span>
        <span><span id="cart-count">0</span> รายการ ></span>
    </a>

    <script>
        const mainItems = [
            { id: 1, name: 'ชุดอิ่มจุ สุดคุ้ม', price: 69, img: 'images/11.png' },
            { id: 2, name: 'ชุดสายหมู', price: 79, img: 'images/9.png' },
            { id: 3, name: 'ชุดติดเทรน', price: 99, img: 'images/10.png' },
            { id: 4, name: 'ชุดรวมหัวปาร์ตี้', price: 199, img: 'images/12.png' }
        ];

        const sauceItems = [
            { id: 101, name: 'น้ำจิ้มงาคั่วหม่าล่า (ขวด)', price: 69, img: 'images/mala_sauce.png' },
            { id: 102, name: 'น้ำจิ้มสุกี้กวางตุ้ง', price: 15, img: 'images/N-suki.png' },
            { id: 103, name: 'น้ำจิ้มงาคั่วหม่าล่า', price: 29, img: 'images/N-mala.png' },
            { id: 104, name: 'น้ำจิ้มงาคั่วหอม(ขาว)', price: 25, img: 'images/N-vha.png' }
        ];

        const soupOptions = [
            { name: 'น้ำซุปดำ', extra: 0 },
            { name: 'น้ำซุปหม่าล่าดั้งเดิม', extra: 0 },
            { name: 'น้ำซุปหม่าล่าน้ำข้น', extra: 10 },
            { name: 'น้ำซุปหม่าล่าน้ำข้นน้ำดำ', extra: 10 }
        ];

        let cart = JSON.parse(sessionStorage.getItem('cartItems') || '[]');
        let currentItem = null;
        let selectedSoup = soupOptions[0];
        let selectedSpicy = 'น้อย';

        function renderMain() {
            document.getElementById('main-menu').innerHTML = mainItems.map(item => `
                <div class="menu-card" onclick="openSoupModal(${item.id})">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="card-info">
                        <div class="name">${item.name}</div>
                        <div class="price">${item.price}.-</div>
                        <button class="select-btn">เลือก</button>
                    </div>
                </div>
            `).join('');
        }

        function renderSauce() {
            document.getElementById('sauce-menu').innerHTML = sauceItems.map(item => `
                <div class="menu-card sauce-card" onclick="addSauceToCart(${item.id})">
                    <img src="${item.img}">
                    <div class="card-info">
                        <div class="name">${item.name}</div>
                        <div class="price">${item.price}.-</div>
                        <button class="select-btn">เพิ่ม</button>
                    </div>
                </div>
            `).join('');
        }

        // Modal Logic
        function openSoupModal(id) {
            currentItem = mainItems.find(m => m.id === id);
            document.getElementById('modal-item-name').innerText = currentItem.name;
            
            // Reset options
            selectedSoup = soupOptions[0];
            selectedSpicy = 'น้อย';
            
            const soupContainer = document.getElementById('soup-options');
            soupContainer.innerHTML = soupOptions.map((s, idx) => `
                <div class="option-item ${idx === 0 ? 'active' : ''}" onclick="setSoup(${idx}, this)">
                    <span>${s.name}</span>
                    <span>${s.extra > 0 ? '+'+s.extra+'.-' : 'ฟรี'}</span>
                </div>
            `).join('');

            checkSpicyVisibility();
            document.getElementById('soup-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('soup-modal').style.display = 'none';
        }

        function setSoup(index, el) {
            document.querySelectorAll('.option-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            selectedSoup = soupOptions[index];
            checkSpicyVisibility();
        }

        function checkSpicyVisibility() {
            const spicyGroup = document.getElementById('spicy-group');
            spicyGroup.style.display = selectedSoup.name.includes('หม่าล่า') ? 'block' : 'none';
        }

        function setSpicy(val, el) {
            document.querySelectorAll('.spicy-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            selectedSpicy = val;
        }

        function confirmSelection() {
            let finalName = `${currentItem.name} (${selectedSoup.name})`;
            if(selectedSoup.name.includes('หม่าล่า')) {
                finalName += ` [เผ็ด${selectedSpicy}]`;
            }
            saveToCart(finalName, currentItem.price + selectedSoup.extra);
            closeModal();
        }

        function addSauceToCart(id) {
            const sauce = sauceItems.find(s => s.id === id);
            saveToCart(sauce.name, sauce.price);
        }

        function saveToCart(name, price) {
            cart.push({ name, price, details: [] });
            sessionStorage.setItem('cartItems', JSON.stringify(cart));
            updateCartUI();
            showToast();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 1000);
        }

        // Initialize
        renderMain();
        renderSauce();
        updateCartUI();
    </script>
</body>
</html>
