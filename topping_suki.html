<head>

    <style>
        body { padding-bottom: 120px; }

        .topping-category { margin-bottom: 22px; }
        .category-title {
            position: sticky; top: 58px;
            background: var(--bg-cream);
            padding: 10px 4px;
            color: var(--primary-red);
            font-family: 'Noto Serif Thai', serif;
            font-size: 1rem;
            font-weight: 700;
            border-bottom: 2px solid var(--gold);
            z-index: 10;
        }

        .topping-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 10px; padding: 0 4px; }
        .topping-card {
            background: var(--card-white);
            border-radius: 13px;
            padding: 7px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            position: relative;
            box-shadow: 0 4px 10px rgba(43,28,18,0.06);
        }
        .topping-card.selected { border-color: var(--primary-red); background-color: #fffaf9; box-shadow: 0 0 0 3px rgba(148,1,9,0.1); }
        .topping-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 9px; }
        .topping-name { font-size: 0.72rem; font-weight: 500; margin: 5px 0; height: 2.2em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--ink); }
        .topping-price { font-size: 0.82rem; font-weight: 700; color: var(--primary-red); }

        .count-controls { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 5px; visibility: hidden; }
        .selected .count-controls { visibility: visible; }
        .count-controls button { background: var(--primary-red); color: white; border: none; width: 21px; height: 21px; border-radius: 50%; cursor: pointer; }
        .count-display { font-weight: bold; width: 18px; color: var(--primary-red); }

        .next-btn.disabled { background: #b7ab98 !important; border-color: #d8cfc0 !important; box-shadow: none !important; }
        .badge-new { position: absolute; top: 5px; left: 5px; background: var(--success-green); color: #fff; font-size: 0.55rem; font-weight: 700; padding: 2px 6px; border-radius: 20px; z-index: 2; }

        #sauce-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44,28,18,0.55); z-index: 1000; justify-content: center; align-items: center; }
        .sauce-modal-content { background: var(--cream-soft); padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border-top: 3px solid var(--gold); }
        .sauce-option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .sauce-card { cursor: pointer; border-radius: 12px; padding: 4px; border: 2px solid transparent; }
        .sauce-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; }
        .sauce-card.selected { border-color: var(--primary-red); background: #fffaf9; }
        .sauce-card-name { font-size: 0.78rem; margin-top: 4px; color: var(--ink); }

        .serve-option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .serve-img-ph {
            width: 100%; aspect-ratio: 1/1; border-radius: 12px;
            background: #f2ece0; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; overflow: hidden;
        }
        .serve-img-ph img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        .serve-card.locked { opacity: 0.4; filter: grayscale(70%); pointer-events: none; cursor: not-allowed; }
        .serve-card-name { font-size: 0.68rem; margin-top: 4px; color: var(--ink); line-height: 1.25; }
        #serve-lock-note { font-size: 0.72rem; color: var(--primary-red); margin-top: 8px; line-height: 1.5; }
        .add-more-topping-btn {
            display: block; margin: 12px auto 0 auto;
            background: transparent; border: 1px solid #d8cfc0; color: #8a7a63;

        }

        #hotpot-modal-title { color: var(--primary-red); font-family: 'Noto Serif Thai', serif; margin: 18px 0 0 0; font-size: 1.05rem; }
        #modalConfirmBtn.disabled { background: #b7ab98 !important; border-color: #d8cfc0 !important; box-shadow: none !important; }

    let selectedToppings = {}; 
    let mainItemDetails = {}; 
    let grandTotal = 0; 
    const MIN_TOPPINGS_COUNT = 3; 

    function loadSukiDetails() {
        const storedDetails = sessionStorage.getItem('sukiMainItem');
        if (storedDetails) {
            mainItemDetails = JSON.parse(storedDetails);
            const infoElement = document.getElementById('main-item-info');
            infoElement.innerHTML = `รายการหลัก: 
                <strong>${mainItemDetails.name}</strong> 
                (${mainItemDetails.price.toLocaleString()} บาท)
                ${mainItemDetails.spice ? ` - เผ็ดระดับ: ${mainItemDetails.spice}` : ''}
            `;
        } else {
             window.location.href = 'suki_type.html';
        }
    }

    function renderToppings() {
        const container = document.getElementById('topping-sections');
        const groupedToppings = TOPPING_DATA.reduce((acc, item) => {
            acc[item.category] = acc[item.category] || [];
            acc[item.category].push(item);
            return acc;
        }, {});

        let html = '';
        for (const category in groupedToppings) {
            html += `<div class="topping-category"><h2 class="category-title">${category}</h2><div class="topping-grid">`;
            groupedToppings[category].forEach(item => {
                html += `
                    <div class="topping-card" data-sku="${item.sku}" onclick="updateToppingSelection('${item.sku}')" id="card-${item.sku}">
                        ${item.isNew ? `<span class="badge-new">New</span>` : ''}
                        <img src="images/${item.image}" alt="${item.name}">
                        <div class="topping-name">${item.name}</div>
                        ${item.note ? `<div class="topping-note">${item.note}</div>` : ''}
                        <div class="topping-price">${item.price.toLocaleString()} บาท</div>
                        <div class="count-controls">
                            <button onclick="changeCount(event, '${item.sku}', -1)">-</button>
                            <span class="count-display" id="count-${item.sku}">1</span>
                            <button onclick="changeCount(event, '${item.sku}', 1)">+</button>
                        </div>
                    </div>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
        updateTotalDisplay();
    }

    function updateToppingSelection(sku) {
        const itemData = TOPPING_DATA.find(item => item.sku === sku);
        const cardElement = document.getElementById(`card-${sku}`);
        if (selectedToppings[sku]) {
            delete selectedToppings[sku];
            cardElement.classList.remove('selected');
        } else {
            selectedToppings[sku] = { ...itemData, count: 1 };
            cardElement.classList.add('selected');
            document.getElementById(`count-${sku}`).innerText = 1;
        }
        updateTotalDisplay();
    }

    function changeCount(event, sku, delta) {
        event.stopPropagation();
        if (!selectedToppings[sku]) return;
        let newCount = selectedToppings[sku].count + delta;
        if (newCount <= 0) {
            updateToppingSelection(sku);
        } else {
            selectedToppings[sku].count = newCount;
            document.getElementById(`count-${sku}`).innerText = newCount;
            updateTotalDisplay();
        }
    }

    function updateTotalDisplay() {
        let toppingTotal = Object.values(selectedToppings).reduce((total, item) => total + (item.price * item.count), 0);
        let totalToppingCount = Object.values(selectedToppings).reduce((count, item) => count + item.count, 0);

        const mainPrice = mainItemDetails.price || 0;
        grandTotal = mainPrice + toppingTotal;

        const totalDisplayElement = document.getElementById('grand-total-display');
        const nextButton = document.getElementById('next-btn');

        if (totalDisplayElement) totalDisplayElement.innerText = `${grandTotal.toLocaleString()} บาท`;
        
        if (totalToppingCount < MIN_TOPPINGS_COUNT) {
            nextButton.classList.add('disabled');
            nextButton.disabled = true; 
            nextButton.innerHTML = `📌 เลือกท็อปปิ้งเพิ่มอีก ${MIN_TOPPINGS_COUNT - totalToppingCount} ไม้ <span class="total-amount">${grandTotal.toLocaleString()} บาท</span>`;
        } else {
            nextButton.classList.remove('disabled');
            nextButton.disabled = false; 
            nextButton.innerHTML = `✅ยืนยันออเดอร์ <span class="total-amount">${grandTotal.toLocaleString()} บาท</span>`;
        }
    }

    const orderFlow = sessionStorage.getItem('orderFlow') || '';

    // ตัวเลือกรูปแบบการเสิร์ฟ (เฉพาะ flow HOTPOT) — ราคา 0 บาท เป็นแค่ SKU บอกรูปแบบการเสิร์ฟ
    const SERVE_OPTIONS = [
        { id: 'cup', sku: 'HP001', name: 'เสิร์ฟถ้วยพร้อมทาน (ชุดแก้ว + ตะเกียบ 1 คน)', img: 'Hotpot-0.png', minAmount: 0 },
        { id: 'pot1', sku: 'HP002', name: 'หม้อไฟ (ชุดแก้ว + ตะเกียบ 1 คน)', img: 'Hotpot-1.png', minAmount: 80 },
        { id: 'pot2', sku: 'HP003', name: 'หม้อไฟ (ชุดแก้ว + ตะเกียบ 2 คน)', img: 'Hotpot-2.png', minAmount: 140 }
    ];
    let selectedSauce = null;
    let selectedServe = null;

    // ยอดที่ใช้เช็คเงื่อนไขรูปแบบการเสิร์ฟ = ยอดของออเดอร์/ถ้วยนี้ชุดเดียว (เมนูหลัก + ท็อปปิ้งที่กำลังจะสั่ง)
    // ไม่นับรวมยอดออเดอร์อื่นที่มีอยู่แล้วในตะกร้า เพราะแต่ละถ้วย/ชุดต้องถึงยอดขั้นต่ำของตัวเอง
    function getCartTotalSoFar() {
        return grandTotal;
    }

    function renderServeOptions() {
        const grid = document.getElementById('serve-choice-grid');
        const totalSoFar = getCartTotalSoFar();
        let html = '';
        SERVE_OPTIONS.forEach(opt => {
            const unlocked = totalSoFar >= opt.minAmount;
            const isSelected = selectedServe && selectedServe.id === opt.id;
            html += `
                <div class="sauce-card serve-card ${isSelected ? 'selected' : ''} ${unlocked ? '' : 'locked'}"
                     onclick="${unlocked ? `selectServe('${opt.id}')` : ''}">
                    <div class="serve-img-ph"><img src="images/${opt.img}" alt="${opt.name}"></div>
                    <div class="serve-card-name">${opt.name}</div>
                    ${!unlocked ? `<div id="serve-lock-note">สั่งซื้อครบ ${opt.minAmount} บาท จึงเลือกได้</div>` : ''}
                </div>`;
        });
        grid.innerHTML = html;
    }

    function selectServe(id) {
        selectedServe = SERVE_OPTIONS.find(o => o.id === id) || null;
        renderServeOptions();
        updateHotpotConfirmState();
    }

    function handleSauceClick(el) {
        const name = el.dataset.name;
        const img = el.dataset.img;
        const sku = el.dataset.sku;
        if (orderFlow === 'HOTPOT') {
            selectedSauce = { name, img, sku };
            document.querySelectorAll('#sauce-choice-grid .sauce-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            updateHotpotConfirmState();
        } else {
            processOrder(name, img, sku);
        }
    }

    function updateHotpotConfirmState() {
        const btn = document.getElementById('modalConfirmBtn');
        if (selectedSauce && selectedServe) {
            btn.disabled = false;
            btn.classList.remove('disabled');
            btn.innerText = '✅ ยืนยันออเดอร์';
        } else {
            btn.disabled = true;
            btn.classList.add('disabled');
            btn.innerText = 'เลือกน้ำจิ้มและรูปแบบเสิร์ฟให้ครบ';
        }
    }

    function closeSauceModal() {
        document.getElementById('sauce-modal').style.display = 'none';
    }

    function confirmHotpotOrder() {
        if (!selectedSauce || !selectedServe) return;
        processOrder(selectedSauce.name, selectedSauce.img, selectedSauce.sku, selectedServe);
    }

    function calculateAndSave() {
        let totalToppingCount = Object.values(selectedToppings).reduce((count, item) => count + item.count, 0);
        
        if (totalToppingCount < MIN_TOPPINGS_COUNT) {
            alert(`⚠️ กรุณาเลือกท็อปปิ้งเสริมอย่างน้อย ${MIN_TOPPINGS_COUNT} ไม้`);
            return;
        }

        // flow HOTPOT: ต้องเจอ popup เสมอ (เลือกน้ำจิ้ม + รูปแบบการเสิร์ฟ) ไม่ว่าเมนูหลักจะเป็นอะไร
        if (orderFlow === 'HOTPOT') {
            document.getElementById('serve-format-section').style.display = 'block';
            renderServeOptions();
            updateHotpotConfirmState();
            document.getElementById('sauce-modal').style.display = 'flex';
            return;
        }

        // เงื่อนไขข้าม Modal (เฉพาะ flow ปกติ ไม่ใช่ HOTPOT): สุกี้แห้ง หรือ มาม่าเซ็ต (isNoodleSet)
        const isSukiHang = mainItemDetails.name.includes("สุกี้แห้ง");
        const isMamaSet = mainItemDetails.isNoodleSet === true;

        if (isSukiHang || isMamaSet) {
            processOrder(null, null);
        } else {
            document.getElementById('sauce-modal').style.display = 'flex';
        }
    }

    function processOrder(sauceName, sauceImg, sauceSku, serveOption) {
        let orderItems = [];
        let totalToppingCount = Object.values(selectedToppings).reduce((count, item) => count + item.count, 0);

        // รูปแบบการเสิร์ฟ (HOTPOT) ต้องอยู่บรรทัดแรกของใบเสร็จ
        if (serveOption) {
            orderItems.push({ sku: serveOption.sku, name: serveOption.name, price: 0, count: 1, type: 'ServeFormat' });
        }

        const mainName = mainItemDetails.name + (mainItemDetails.spice ? ` (เผ็ด${mainItemDetails.spice})` : '');
        orderItems.push({ sku: mainItemDetails.sku || 'M1', name: mainName, price: mainItemDetails.price, count: 1, type: 'Main' });

        if (sauceName) {
            orderItems.push({ sku: sauceSku || '', name: sauceName, price: 0, count: 1, type: 'Sauce' });
        }

        Object.values(selectedToppings).forEach(topping => {
            orderItems.push({
                sku: topping.sku,
                name: topping.name + (topping.note ? ` (${topping.note})` : ''),
                price: topping.price,
                count: topping.count,
                type: 'Topping'
            });
        });

        const finalOrderSet = {
            name: mainItemDetails.name + (totalToppingCount > 0 ? ` (+${totalToppingCount} รายการ)` : ''), 
            price: grandTotal,
            count: 1, 
            details: orderItems,
            isSukiSet: true
        };

        let cartItems = JSON.parse(sessionStorage.getItem('cartItems') || '[]');
        cartItems.push(finalOrderSet);
        sessionStorage.setItem('cartItems', JSON.stringify(cartItems));
        sessionStorage.removeItem('sukiMainItem');

        window.location.href = 'summary.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadSukiDetails();
        renderToppings();
    });
</script>
</body>
</html>
