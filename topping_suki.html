<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกท็อปปิ้งสุกี้/หม่าล่า</title> 
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ======================================= */
        /* === 1. BASE STYLES & TYPOGRAPHY === */
        /* ======================================= */
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f1e9d9;
            color: #333;
            margin: 0;
            padding: 10px;
            padding-bottom: 150px;
        } 
        .container {
            max-width: 960px;
            margin: auto;
            padding: 0;
        }
        h1 {
            color: #940109;
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        p.price-info {
            color: #940109;
            text-align: center;
            font-size: 1.0em;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        /* ======================================= */
        /* === 2. TOPPING STYLES === */
        /* ======================================= */
        .topping-category {
            margin-bottom: 25px;
            border-top: 3px solid #940109;
            padding-top: 15px;
        }
        .category-title {
            font-size: 1.3em;
            color: #940109;
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 5px;
        }
        .topping-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px;
            padding: 0 5px;
        }
        .topping-card {
            background-color: #ffffff;
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
        }
        .topping-card:hover {
            border-color: #940109;
        }
        .topping-card.selected {
            border-color: #27ae60;
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.3);
            background-color: #e8f5e9;
        }
        
        .topping-card img {
            width: 100%;
            max-width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 6px;
            margin: 0 auto 5px auto;
        }
        .topping-name {
            font-size: 0.75em;
            font-weight: 700;
            color: #333;
            line-height: 1.1;
            min-height: 2.2em; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 2px;
        }
        .topping-note {
            font-size: 0.65em; 
            color: #555; 
            line-height: 1;
            margin-bottom: 3px;
        }
        .topping-price {
            font-size: 0.9em;
            color: #940109;
            font-weight: 700;
        }
        
        .badge-new {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #ff0000;
            color: white;
            font-size: 0.6em;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 5px;
            text-transform: uppercase;
            z-index: 10;
        }

        .count-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
            visibility: hidden; 
            opacity: 0;
            transition: all 0.2s;
        }
        .topping-card.selected .count-controls {
            visibility: visible;
            opacity: 1;
        }
        .count-controls button {
            background-color: #940109;
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 1.0em;
            line-height: 1;
            cursor: pointer;
            padding: 0;
            margin: 0 2px;
        }
        .count-controls .count-display {
            font-size: 0.9em;
            font-weight: 700;
            width: 20px;
            text-align: center;
            color: #940109;
        }

        /* ======================================= */
        /* === 3. FIXED FOOTER === */
        /* ======================================= */
        .footer-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: transparent;
            padding: 15px 0;
            pointer-events: none;
            z-index: 1000;
        }
        .footer-content {
            max-width: 960px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
            pointer-events: none;
        }

        .next-btn {
            background-color: #940109; 
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1.0em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 90%;
            justify-content: center;
            transition: 0.3s;
        }
        
        .next-btn.disabled {
            background-color: #666 !important;
            opacity: 0.8;
            cursor: not-allowed;
        }

        .total-amount {
            background-color: #ffffff;
            color: #940109;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 700;
            margin-left: 5px;
        }

        /* Sauce Modal Styles */
        #sauce-modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box;
        }
        .sauce-modal-content {
            background: white; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center;
        }
        .sauce-option-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px;
        }
        .sauce-card {
            border: 2px solid #ddd; 
            border-radius: 15px; 
            padding: 10px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .sauce-card:hover {
            border-color: #940109;
        }
        .sauce-card img {
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            margin-bottom: 10px;
        }
        .sauce-card div {
            font-size: 0.85em; 
            font-weight: bold;
        }
    </style>
</head>

    let selectedToppings = {}; 
    let mainItemDetails = {}; 
    let grandTotal = 0; 
    const MIN_TOPPINGS_COUNT = 3; 

    function loadSukiDetails() {
        const storedDetails = sessionStorage.getItem('sukiMainItem');
        if (storedDetails) {
            mainItemDetails = JSON.parse(storedDetails);
            const infoElement = document.getElementById('main-item-info');
            infoElement.innerHTML = `รายการหลัก: 
                <strong>${mainItemDetails.name}</strong> 
                (${mainItemDetails.price.toLocaleString()} บาท)
                ${mainItemDetails.spice ? ` - เผ็ดระดับ: ${mainItemDetails.spice}` : ''}
            `;
        } else {
             window.location.href = 'suki_type.html';
        }
    }

    function renderToppings() {
        const container = document.getElementById('topping-sections');
        const groupedToppings = TOPPING_DATA.reduce((acc, item) => {
            acc[item.category] = acc[item.category] || [];
            acc[item.category].push(item);
            return acc;
        }, {});

        let html = '';
        for (const category in groupedToppings) {
            html += `<div class="topping-category"><h2 class="category-title">${category}</h2><div class="topping-grid">`;
            groupedToppings[category].forEach(item => {
                html += `
                    <div class="topping-card" data-id="${item.id}" onclick="updateToppingSelection('${item.id}')" id="card-${item.id}">
                        ${item.isNew ? `<span class="badge-new">New</span>` : ''}
                        <img src="images/${item.image}" alt="${item.name}">
                        <div class="topping-name">${item.name}</div>
                        ${item.note ? `<div class="topping-note">${item.note}</div>` : ''}
                        <div class="topping-price">${item.price.toLocaleString()} บาท</div>
                        <div class="count-controls">
                            <button onclick="changeCount(event, '${item.id}', -1)">-</button>
                            <span class="count-display" id="count-${item.id}">1</span>
                            <button onclick="changeCount(event, '${item.id}', 1)">+</button>
                        </div>
                    </div>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
        updateTotalDisplay();
    }

    function updateToppingSelection(id) {
        const itemData = TOPPING_DATA.find(item => item.id === id);
        const cardElement = document.getElementById(`card-${id}`);
        if (selectedToppings[id]) {
            delete selectedToppings[id];
            cardElement.classList.remove('selected');
        } else {
            selectedToppings[id] = { ...itemData, count: 1 };
            cardElement.classList.add('selected');
            document.getElementById(`count-${id}`).innerText = 1;
        }
        updateTotalDisplay();
    }

    function changeCount(event, id, delta) {
        event.stopPropagation();
        if (!selectedToppings[id]) return;
        let newCount = selectedToppings[id].count + delta;
        if (newCount <= 0) {
            updateToppingSelection(id);
        } else {
            selectedToppings[id].count = newCount;
            document.getElementById(`count-${id}`).innerText = newCount;
            updateTotalDisplay();
        }
    }

    function updateTotalDisplay() {
        let toppingTotal = Object.values(selectedToppings).reduce((total, item) => total + (item.price * item.count), 0);
        let totalToppingCount = Object.values(selectedToppings).reduce((count, item) => count + item.count, 0);

        const mainPrice = mainItemDetails.price || 0;
        grandTotal = mainPrice + toppingTotal;

        const totalDisplayElement = document.getElementById('grand-total-display');
        const nextButton = document.getElementById('next-btn');

        if (totalDisplayElement) totalDisplayElement.innerText = `${grandTotal.toLocaleString()} บาท`;
        
        if (totalToppingCount < MIN_TOPPINGS_COUNT) {
            nextButton.classList.add('disabled');
            nextButton.disabled = true; 
            nextButton.innerHTML = `📌 เลือกท็อปปิ้งเพิ่มอีก ${MIN_TOPPINGS_COUNT - totalToppingCount} ไม้ <span class="total-amount">${grandTotal.toLocaleString()} บาท</span>`;
        } else {
            nextButton.classList.remove('disabled');
            nextButton.disabled = false; 
            nextButton.innerHTML = `✅ยืนยันออเดอร์ <span class="total-amount">${grandTotal.toLocaleString()} บาท</span>`;
        }
    }

    function calculateAndSave() {
        let totalToppingCount = Object.values(selectedToppings).reduce((count, item) => count + item.count, 0);
        
        if (totalToppingCount < MIN_TOPPINGS_COUNT) {
            alert(`⚠️ กรุณาเลือกท็อปปิ้งเสริมอย่างน้อย ${MIN_TOPPINGS_COUNT} ไม้`);
            return;
        }

        // เงื่อนไขข้าม Modal: สุกี้แห้ง หรือ มาม่าเซ็ต (isNoodleSet)
        const isSukiHang = mainItemDetails.name.includes("สุกี้แห้ง");
        const isMamaSet = mainItemDetails.isNoodleSet === true;

        if (isSukiHang || isMamaSet) {
            processOrder(null, null);
        } else {
            document.getElementById('sauce-modal').style.display = 'flex';
        }
    }

    function processOrder(sauceName, sauceImg) {
        let orderItems = [];
        let totalToppingCount = Object.values(selectedToppings).reduce((count, item) => count + item.count, 0);

        orderItems.push({ id: 'M1', name: mainItemDetails.name, price: mainItemDetails.price, count: 1, type: 'Main' });
        
        if (mainItemDetails.spice) {
             orderItems.push({ id: 'S1', name: `ระดับเผ็ด: ${mainItemDetails.spice}`, price: 0, count: 1, type: 'Spice' });
        }
        
        if (sauceName) {
            orderItems.push({ id: 'FREE_SAUCE', name: sauceName, price: 0, count: 1, type: 'Sauce' });
        }

        Object.values(selectedToppings).forEach(topping => {
            orderItems.push({
                id: topping.id,
                name: topping.name + (topping.note ? ` (${topping.note})` : ''),
                price: topping.price,
                count: topping.count,
                type: 'Topping'
            });
        });

        const finalOrderSet = {
            name: mainItemDetails.name + (totalToppingCount > 0 ? ` (+${totalToppingCount} รายการ)` : ''), 
            price: grandTotal,
            count: 1, 
            details: orderItems,
            isSukiSet: true
        };

        let cartItems = JSON.parse(sessionStorage.getItem('cartItems') || '[]');
        cartItems.push(finalOrderSet);
        sessionStorage.setItem('cartItems', JSON.stringify(cartItems));
        sessionStorage.removeItem('sukiMainItem');

        window.location.href = 'summary.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadSukiDetails();
        renderToppings();
    });
</script>
</body>
</html>
