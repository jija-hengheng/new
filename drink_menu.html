<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เมนูเครื่องดื่ม - จิจะ เฮงเฮง</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        body { padding-bottom: 110px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; max-width: 600px; margin: auto; padding: 0 4px; }
        .menu-item { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 16px rgba(43,28,18,0.08); display: flex; flex-direction: column; position: relative; border: 1px solid rgba(148, 1, 9, 0.06); }
        .menu-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #fff; padding: 5px; box-sizing: border-box; }
        
        .menu-info { padding: 8px 10px; text-align: center; flex-grow: 1; }
        .menu-name { font-weight: 500; font-size: 0.88rem; height: 2.4em; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; color: var(--ink); }
        .menu-price { color: var(--primary-red); font-weight: 700; font-size: 1.02rem; margin-bottom: 8px; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--primary-red); background: #fdfdfd; cursor: pointer; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; color: var(--primary-red); }
        .qty-val { font-weight: 700; min-width: 20px; font-size: 1.05rem; }

        .add-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, var(--primary-red), var(--dark-red)); color: var(--cream-soft); border: none; font-weight: 600; border-radius: 0 0 16px 16px; cursor: pointer; }

        .floating-cart {
            position: fixed; bottom: 22px; right: 18px;
            width: 68px; height: 68px;
            background: linear-gradient(155deg, var(--primary-red), var(--dark-red)); color: var(--cream-soft);
            border-radius: 50%; border: 3px solid var(--gold-soft);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 8px 22px rgba(148,1,9,0.4);
            text-decoration: none; z-index: 1000;
        }
        .cart-icon { font-size: 1.5rem; margin-bottom: -2px; }
        .badge {
            position: absolute; top: -2px; right: -2px;
            background: var(--gold); color: #3a2a00;
            font-size: 0.8rem; font-weight: 800;
            width: 23px; height: 23px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="themed">

    <div class="mini-header">
        <a href="index.html" class="back-btn">←</a>
        <img src="images/2.png" class="mini-logo" alt="จิจะเฮงเฮง">
        <div>
            <div class="mini-title">🥤 เครื่องดื่ม</div>
            <div class="mini-sub">สดชื่น พร้อมแก้วฟรีน้ำแข็งทุกเมนู</div>
        </div>
    </div>

    <div class="t-container" style="padding-top:14px;">
    <div class="menu-grid" id="menu-container">
        </div>
    </div>

    <a href="summary.html" class="floating-cart" id="btn-summary">
        <span class="badge" id="cart-count">0</span>
        <span class="cart-icon">🛒</span>
        <span style="font-size: 0.65rem; font-weight: 700;">สั่งเลย</span>
    </a>

    <script>
        // รายการเมนูอ้างอิงรูปจากโฟลเดอร์ images/ เป็นไฟล์ .png ทั้งหมด
        const drinks = [
            { name: 'โค้ก + แก้วน้ำแข็ง', price: 25, img: 'images/coke.png' },
            { name: 'น้ำฟักเขียว + แก้วน้ำแข็ง', price: 25, img: 'images/fuk.png' },
            { name: 'น้ำเก๊กฮวย + แก้วน้ำแข็ง', price: 25, img: 'images/gek.png' },
            { name: 'น้ำจับเลี้ยง + แก้วน้ำแข็ง', price: 25, img: 'images/jup.png' },
            { name: 'น้ำลำไย + แก้วน้ำแข็ง', price: 25, img: 'images/lum.png' },
            { name: 'น้ำดื่มขวด', price: 10, img: 'images/water.png' } // อย่าลืมเตรียมไฟล์ water.png ในโฟลเดอร์ images นะครับ
        ];

        let cart = JSON.parse(sessionStorage.getItem('cartItems') || '[]');

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = drinks.map((item, idx) => `
                <div class="menu-item">
                    <img src="${item.img}" class="menu-img" onerror="this.src='https://placehold.co/300x300?text=No+Image'">
                    <div class="menu-info">
                        <div class="menu-name">${item.name}</div>
                        <div class="menu-price">${item.price} บ.</div>
                        <div class="qty-control">
                            <button class="btn-qty" onclick="changeQty('qty-${idx}', -1)">-</button>
                            <span class="qty-val" id="qty-${idx}">1</span>
                            <button class="btn-qty" onclick="changeQty('qty-${idx}', 1)">+</button>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price}, 'qty-${idx}')">เพิ่มลงตะกร้า</button>
                </div>
            `).join('');
            updateCartCount();
        }

        function changeQty(id, delta) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1; 
            el.innerText = val;
        }

        function addToCart(name, price, qtyId) {
            const quantity = parseInt(document.getElementById(qtyId).innerText);
            
            for (let i = 0; i < quantity; i++) {
                cart.push({
                    name: name,
                    price: price,
                    details: []
                });
            }

            sessionStorage.setItem('cartItems', JSON.stringify(cart));
            updateCartCount();
            
            // เอฟเฟกต์เด้งที่ปุ่มสรุปยอดเวลาเพิ่มของ
            const btn = document.getElementById('btn-summary');
            btn.style.transform = 'scale(1.3)';
            setTimeout(() => { btn.style.transform = 'scale(1)'; }, 200);

            document.getElementById(qtyId).innerText = "1";
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        renderMenu();
    </script>
</body>
</html>
