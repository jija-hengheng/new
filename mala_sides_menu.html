<html lang="th">
<head>

    <!-- ใช้ฟอนต์ Kanit และ Noto Serif Thai ตามโครงสร้างเดิม -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        /* กำหนดตัวแปรสีหลัก: แดงเข้ม และ ครีม */
        :root {
            --primary-red: #940109;
            --bg-cream: #f1e9d9;
            --card-white: #ffffff;
            --ink: #2b1c12;
            --ink-soft: #6e5e53;
            --border-cream: #e4dac5;
        }

        body { 
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-cream); 
            color: var(--ink);
            margin: 0;
            padding-top: 125px; /* เผื่อพื้นที่ให้ Header Fixed และ Tabs */
            padding-bottom: 90px; 
            -webkit-tap-highlight-color: transparent;
        }

        /* ปรับปรุงส่วนหัวให้ Fixed อยู่กับที่เพื่อการใช้งานที่ง่าย */
        .header-fixed-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background-color: var(--bg-cream);
            box-shadow: 0 2px 10px rgba(148,1,9,0.08);
        }

        .mini-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--primary-red);
            color: var(--bg-cream);
        }
        .back-btn {
            color: var(--bg-cream);
            text-decoration: none;
            font-size: 1.4rem;
            margin-right: 12px;
            font-weight: bold;
        }
        .mini-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 10px;
            border: 2px solid var(--bg-cream);
        }
        .mini-title {
            font-family: 'Noto Serif Thai', serif;
            font-size: 1rem;
            font-weight: 700;
        }
        .mini-sub {
            font-size: 0.7rem;
            opacity: 0.9;
        }

        /* แถบตัวเลือกหมวดหมู่ด้านบน เลื่อนซ้าย-ขวาได้ */
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 16px;
            background-color: #fffaf0;
            border-bottom: 1px solid var(--border-cream);
            scrollbar-width: none; /* ซ่อน scrollbar ใน Firefox */
        }
        .category-tabs::-webkit-scrollbar {
            display: none; /* ซ่อน scrollbar ใน Chrome/Safari */
        }
        .tab-btn {
            background: var(--bg-cream);
            color: var(--primary-red);
            border: 1px solid var(--border-cream);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: var(--primary-red);
            color: var(--bg-cream);
            border-color: var(--primary-red);
            box-shadow: 0 2px 6px rgba(148,1,9,0.2);
        }

        /* จัดระเบียบการแสดงผลการ์ดสินค้า */
        .category-section {
            padding: 16px 12px 4px;
        }
        .category-title {
            font-family: 'Noto Serif Thai', serif;
            font-size: 0.95rem;
            color: var(--primary-red);
            margin: 0 0 12px 4px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category-title::after {
            content: "";
            height: 2px;
            background: linear-gradient(to right, var(--primary-red), transparent);
            flex-grow: 1;
        }

        /* ปรับ Grid เป็น 3 คอลัมน์ที่รองรับการสัมผัสได้ดีขึ้น */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-bottom: 16px;
        }
        
        .card { 
            background: var(--card-white); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 3px 8px rgba(43,28,18,0.05); 
            display: flex; 
            flex-direction: column; 
            border: 1.5px solid transparent; 
            cursor: pointer; 
            transition: all 0.2s ease;
            position: relative;
        }
        .card.selected { 
            border-color: var(--primary-red); 
            background-color: #fffbf5; 
            box-shadow: 0 4px 12px rgba(148,1,9,0.12); 
        }
        
        .image-container { 
            width: 100%; 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            background: #f7f4ed; 
        }
        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .info { 
            padding: 6px 4px; 
            text-align: center; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        .name { 
            font-size: 0.72rem; 
            font-weight: 500; 
            color: var(--ink); 
            margin-bottom: 4px; 
            line-height: 1.2; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            height: 2.4em; 
        }
        .price-tag { 
            color: var(--primary-red); 
            font-weight: 700; 
            font-size: 0.85rem; 
            margin-bottom: 6px; 
        }

        /* ปรับแต่งปุ่มและตัวควบคุมจำนวนให้กดง่าย ไม่สับสน */
        .action-container {
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .select-btn { 
            border: 1px solid var(--primary-red); 
            background: #fff; 
            color: var(--primary-red); 
            font-size: 0.65rem; 
            font-weight: 600; 
            border-radius: 12px; 
            padding: 3px 10px; 
            cursor: pointer; 
            width: 80%;
            transition: all 0.15s;
        }
        .card:hover .select-btn {
            background: var(--primary-red);
            color: #fff;
        }
        
        .count-controls { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 4px; 
            width: 90%;
        }
        .count-controls button { 
            background: var(--primary-red); 
            color: #fff; 
            border: none; 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .count-display { 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: var(--primary-red); 
        }

        /* ป้ายสินค้าใหม่ */
        .new-badge {
            position: absolute;
            top: 4px;
            left: 4px;
            background: #ff9800;
            color: white;
            font-size: 0.55rem;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: bold;
            z-index: 2;
        }

        .footer-note { 
            text-align: center; 
            padding: 16px 20px; 
            color: var(--ink-soft); 
            font-size: 0.75rem; 
        }

        /* ปรับปรุงปุ่มกดสั่งซื้อด้านล่าง */
        .t-footer-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 12px 16px;
            box-shadow: 0 -3px 12px rgba(0,0,0,0.06);
            z-index: 100;
        }
        .t-btn-primary {
            background: var(--primary-red);
            color: var(--bg-cream);
            border: none;
            border-radius: 25px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(148,1,9,0.25);
        }
        .t-btn-primary.disabled { 
            background: #d4cbba !important; 
            color: #fff !important; 
            box-shadow: none !important; 
            pointer-events: none; 
        }

        @media (max-width: 360px) { 
            .name { font-size: 0.68rem; } 
            .price-tag { font-size: 0.8rem; } 
            .tab-btn { padding: 5px 10px; font-size: 0.75rem; }
        }
    </style>
</head>

        { sku: 'TP044', category: 'หมวดไข่ – เมนูพิเศษ', name: 'ไข่ไก่', image: 'egg.png', price: 10 },
        { sku: 'NJ003', category: 'หมวดน้ำจิ้ม 100 ml', name: 'น้ำจิ้มสุกี้กวางตุ้ง', image: 'N-suki.png', price: 15 },
        { sku: 'NJ001', category: 'หมวดน้ำจิ้ม 100 ml', name: 'น้ำจิ้มงาคั่วหม่าล่า', image: 'N-mala.png', price: 29 },
        { sku: 'NJ002', category: 'หมวดน้ำจิ้ม 100 ml', name: 'น้ำจิ้มงาคั่วหอม', image: 'N-vha.png', price: 25 },
    ];

    let selectedItems = {};

    // คัดแยกกลุ่มหมวดหมู่ทั้งหมดเพื่อนำไปสร้างแถบด้านบน
    const categories = [...new Set(ITEMS_DATA.map(item => item.category))];

    function renderTabs() {
        const tabsContainer = document.getElementById('category-tabs');
        let html = '';
        categories.forEach((cat, index) => {
            // ให้หมวดหมู่แรก Active เป็นค่าเริ่มต้น
            const activeClass = index === 0 ? 'active' : '';
            html += `<button class="tab-btn ${activeClass}" id="tab-${index}" onclick="scrollToCategory('${cat}', ${index})">${cat}</button>`;
        });
        tabsContainer.innerHTML = html;
    }

    function scrollToCategory(categoryName, index) {
        // อัปเดตสถานะ Active บนแถบเมนู
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${index}`).classList.add('active');

        // เลื่อนหน้าจอไปยังเป้าหมาย (หักลบพื้นที่ของ Header Fixed ด้านบน)
        const targetElement = document.getElementById(`section-${categoryName}`);
        if (targetElement) {
            const offset = 135; 
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = targetElement.getBoundingClientRect().top;
            const elementPosition = elementRect - bodyRect;
            const offsetPosition = elementPosition - offset;

            window.scrollTo({
                top: offsetPosition,
                behavior: 'smooth'
            });
        }
    }

    function renderItems() {
        const container = document.getElementById('menu-sections');
        const grouped = ITEMS_DATA.reduce((acc, item) => {
            acc[item.category] = acc[item.category] || [];
            acc[item.category].push(item);
            return acc;
        }, {});

        let html = '';
        for (const category in grouped) {
            // ใส่ ID ประจำหมวดหมู่เพื่อให้ทำงานร่วมกับการกดเลื่อนจากแถบด้านบนได้
            html += `<div class="category-section" id="section-${category}">
                        <div class="category-title">${category}</div>
                        <div class="grid">`;
            
            grouped[category].forEach(item => {
                const sel = selectedItems[item.sku];
                html += `
                    <div class="card ${sel ? 'selected' : ''}" id="card-${item.sku}" onclick="selectItem('${item.sku}')">
                        ${item.isNew ? '<span class="new-badge">ใหม่!</span>' : ''}
                        <div class="image-container">
                            <img src="images/${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/150?text=${encodeURIComponent(item.name)}'">
                        </div>
                        <div class="info">
                            <div class="name">${item.name}</div>
                            <div class="price-tag">${item.price.toLocaleString()}฿</div>
                            <div class="action-container">
                                ${sel
                                    ? `<div class="count-controls">
                                            <button onclick="changeCount(event,'${item.sku}',-1)">-</button>
                                            <span class="count-display" id="count-${item.sku}">${sel.count}</span>
                                            <button onclick="changeCount(event,'${item.sku}',1)">+</button>
                                       </div>`
                                    : `<button class="select-btn">เลือก</button>`
                                }
                            </div>
                        </div>
                    </div>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function selectItem(sku) {
        if (selectedItems[sku]) {
            // ป้องกันการเผลอกดโดนตัวการ์ดแล้วจำนวนหายไป (UX ที่ดีขึ้นคือถ้าเลือกแล้ว ให้ใช้ปุ่มบวก-ลบ แทน)
            return;
        } else {
            const item = ITEMS_DATA.find(i => i.sku === sku);
            if (!item) return;
            selectedItems[sku] = { ...item, count: 1 };
        }
        renderItems();
        updateFooter();
    }

    function changeCount(event, sku, delta) {
        event.stopPropagation(); // หยุดการกดขยายไปยัง Card ชั้นนอก
        if (!selectedItems[sku]) return;
        const newCount = selectedItems[sku].count + delta;
        if (newCount <= 0) {
            delete selectedItems[sku];
            renderItems();
        } else {
            selectedItems[sku].count = newCount;
            document.getElementById(`count-${sku}`).innerText = newCount;
        }
        updateFooter();
    }

    function updateFooter() {
        const items = Object.values(selectedItems);
        const totalCount = items.reduce((sum, i) => sum + i.count, 0);
        const totalPrice = items.reduce((sum, i) => sum + i.count * i.price, 0);
        const btn = document.getElementById('order-footer');
        document.getElementById('order-total').innerText = `${totalPrice.toLocaleString()} บาท`;
        if (totalCount > 0) {
            btn.classList.remove('disabled');
        } else {
            btn.classList.add('disabled');
        }
    }

    function placeOrder() {
        const items = Object.values(selectedItems);
        if (items.length === 0) return;

        const orderItems = items.map(item => ({
            sku: item.sku,
            name: item.name,
            price: item.price,
            count: item.count,
            type: 'Topping'
        }));

        const totalCount = items.reduce((sum, i) => sum + i.count, 0);
        const totalPrice = items.reduce((sum, i) => sum + i.count * i.price, 0);

        const finalOrderSet = {
            name: `วัตถุดิบชาบูหม่าล่า (${totalCount} รายการ)`,
            price: totalPrice,
            count: 1,
            details: orderItems,
            isSidesOnly: true
        };

        let cartItems = JSON.parse(sessionStorage.getItem('cartItems') || '[]');
        cartItems.push(finalOrderSet);
        sessionStorage.setItem('cartItems', JSON.stringify(cartItems));

        window.location.href = 'summary.html';
    }

    // ฟังก์ชันช่วยเปลี่ยนสถานะแถบเมนูด้านบนอัตโนมัติเมื่อผู้ใช้งานเลื่อนหน้าจอ (Scroll Spy)
    window.addEventListener('scroll', () => {
        let currentSectionIndex = 0;
        let minDistance = Infinity;

        categories.forEach((cat, index) => {
            const el = document.getElementById(`section-${cat}`);
            if (el) {
                const rect = el.getBoundingClientRect();
                // ห่างจากขอบบนใกล้เคียงแนว Header
                const dist = Math.abs(rect.top - 140);
                if (rect.top <= 150 && dist < minDistance) {
                    minDistance = dist;
                    currentSectionIndex = index;
                }
            }
        });

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeTab = document.getElementById(`tab-${currentSectionIndex}`);
        if (activeTab) {
            activeTab.classList.add('active');
            // เลื่อนแถบตัวเลือกอัตโนมัติเพื่อให้เห็นปุ่มที่เลือกอยู่เสมอ
            activeTab.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        renderTabs();
        renderItems();
        updateFooter();
    });
</script>

</body>
</html>
