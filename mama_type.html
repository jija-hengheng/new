<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกเมนู: บะหมี่กึ่งสำเร็จรูป</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        body { padding-bottom: 140px; }

        .mama-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 13px; padding: 10px 4px 0 4px; }
        .mama-card {
            background-color: #fff;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 16px rgba(43,28,18,0.08);
            min-height: 190px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .mama-card.selected { border-color: var(--primary-red); box-shadow: 0 0 0 3px rgba(148,1,9,0.12); }
        .mama-card img { max-width: 78%; height: auto; margin: 0 auto 8px auto; object-fit: contain; max-height: 90px; }
        .mama-name { font-size: 0.92em; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
        .mama-price { font-size: 0.92em; color: var(--primary-red); font-weight: 700; }

        .order-info-group { display: flex; flex-direction: column; color: var(--primary-red); }
        .order-summary { font-weight: 700; font-size: 0.92em; }
        .order-summary span { color: var(--ink); }
        .quantity-control { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .count-btn { background-color: var(--primary-red); color: #fff; border: none; border-radius: 8px; width: 28px; height: 28px; font-size: 1.1em; cursor: pointer; }
        #mama-count { font-size: 1.05em; font-weight: 700; min-width: 20px; text-align: center; }
        .total-display { font-weight: 700; margin-left: 8px; color: var(--ink); }

        .next-button { opacity: 0.4; pointer-events: none; }
        .next-button.active { opacity: 1; pointer-events: auto; }

        @media (max-width: 500px) {
            .t-footer-fixed { display: flex; flex-direction: column; gap: 10px; text-align: center; }
            .next-button { width: 100%; }
        }
    </style>
</head>
<body class="themed">

    <div class="mini-header">
        <a href="index.html" class="back-btn">←</a>
        <img src="images/2.png" class="mini-logo" alt="จิจะเฮงเฮง">
        <div>
            <div class="mini-title">🍜 ต้มมาม่าทรงเครื่อง</div>
            <div class="mini-sub">เลือกได้เพียง 1 เมนู</div>
        </div>
    </div>

    <div class="t-container">
        <div class="mama-grid">
            <div class="mama-card" data-id="MM003" data-name="มาม่า เย็นตาโฟ" data-price="10" onclick="selectMama(this)">
                <img src="images/yentafo.png" alt="มาม่า เย็นตาโฟ">
                <div class="mama-name">มาม่า เย็นตาโฟ</div>
                <div class="mama-price">10 บ.</div>
            </div>
            <div class="mama-card" data-id="MM005" data-name="มาม่า หมูสับ" data-price="10" onclick="selectMama(this)">
                <img src="images/moosub.png" alt="มาม่า หมูสับ">
                <div class="mama-name">มาม่า หมูสับ</div>
                <div class="mama-price">10 บ.</div>
            </div>
            <div class="mama-card" data-id="MM002" data-name="มาม่า ต้มยำกุ้งน้ำข้น" data-price="10" onclick="selectMama(this)">
                <img src="images/tomyumZom.png" alt="มาม่า ต้มยำกุ้งน้ำข้น">
                <div class="mama-name">มาม่า ต้มยำกุ้งน้ำข้น</div>
                <div class="mama-price">10 บ.</div>
            </div>
            <div class="mama-card" data-id="MM004" data-name="มาม่า ต้มยำกุ้ง" data-price="10" onclick="selectMama(this)">
                <img src="images/tomyumkung.png" alt="มาม่า ต้มยำกุ้ง">
                <div class="mama-name">มาม่า ต้มยำกุ้ง</div>
                <div class="mama-price">10 บ.</div>
            </div>
            <div class="mama-card" data-id="MM001" data-name="ยำยำ ต้มยำกุ้ง" data-price="10" onclick="selectMama(this)">
                <img src="images/yumyumred.png" alt="ยำยำ ต้มยำกุ้ง">
                <div class="mama-name">ยำยำ ต้มยำกุ้ง</div>
                <div class="mama-price">10 บ.</div>
            </div>
           <div class="mama-card" data-id="MM007" data-name="ยำยำ ต้มยำน้ำข้น" data-price="10" onclick="selectMama(this)">
                <img src="images/yumyumzom.png" alt="ยำยำ ต้มยำน้ำข้น (สีส้ม)">
                <div class="mama-name">ยำยำ ต้มยำน้ำข้น</div>
                <div class="mama-price">10 บ.</div>
            </div>
            <div class="mama-card" data-id="MM006" data-name="ไวไว ต้มยำหมูสับ" data-price="10" onclick="selectMama(this)">
                <img src="images/vvmoosub.png" alt="ไวไว ต้มยำหมูสับ">
                <div class="mama-name">ไวไว ต้มยำหมูสับ</div>
                <div class="mama-price">10 บ.</div>
            </div>
        </div>
    </div>

    <div class="t-footer-fixed" id="footer-summary" style="display:none;">
        <div class="order-info-group">
            <div class="order-summary">
                เมนู: <span id="selected-mama-name">ยังไม่ได้เลือก</span> 
            </div>
            <div class="quantity-control" id="quantity-control-area">
                <button class="count-btn" onclick="updateCount(-1)">-</button>
                <span id="mama-count">1</span>
                <button class="count-btn" onclick="updateCount(1)">+</button>
                <span class="total-display">รวม: <span id="current-total-price">10</span> บ.</span>
            </div>
        </div>
        <button class="t-btn-primary next-button" id="next-btn" onclick="goToToppings()">
            เลือกท็อปปิ้ง 👉
        </button>
    </div>

<script>
    let selectedMama = null; 

    function updateFooter() {
        if (!selectedMama) return;
        const count = selectedMama.count;
        const total = count * selectedMama.price;
        
        document.getElementById('selected-mama-name').innerText = `${selectedMama.name}`;
        document.getElementById('mama-count').innerText = count;
        document.getElementById('current-total-price').innerText = total.toLocaleString();

        const nextButton = document.getElementById('next-btn');
        nextButton.innerText = `เลือกท็อปปิ้ง (${total.toLocaleString()} บ.)`;
        nextButton.classList.add('active');
        
        // แสดงแถบสรุปเมื่อมีการเลือกครั้งแรก
        document.getElementById('footer-summary').style.display = 'flex';
    }

    function updateCount(change) {
        if (!selectedMama) return;
        let newCount = selectedMama.count + change;
        if (newCount < 1) newCount = 1;
        selectedMama.count = newCount;
        updateFooter();
    }

    function selectMama(element) {
        document.querySelectorAll('.mama-card').forEach(card => card.classList.remove('selected'));
        element.classList.add('selected');
        
        selectedMama = {
            id: element.getAttribute('data-id'),
            name: element.getAttribute('data-name'),
            price: parseInt(element.getAttribute('data-price')),
            count: 1 
        };
        updateFooter();
    }

    function goToToppings() {
        if (!selectedMama) return;
        const totalMamaPrice = selectedMama.price * selectedMama.count;
        const mainItemData = {
            mainId: selectedMama.id,
            sku: selectedMama.id,
            name: `${selectedMama.name} x ${selectedMama.count} ห่อ`, 
            price: totalMamaPrice, 
            spice: 'มาม่า',
            isNoodleSet: true, 
            originalCount: selectedMama.count 
        };
        sessionStorage.setItem('sukiMainItem', JSON.stringify(mainItemData));
        window.location.href = 'topping_suki.html'; 
    }
</script>
</body>
</html>
