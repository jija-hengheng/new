<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เมนูเส้น - สั่งอาหาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        body { padding-bottom: 110px; }
        .item-price { color: var(--primary-red); }
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px dashed rgba(148,1,9,0.15); }
        .addon-counter { display: flex; align-items: center; gap: 12px; }
        .btn-round { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--primary-red); background: #fff; color: var(--primary-red); font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="themed">

    <div class="mini-header">
        <a href="index.html" class="back-btn">←</a>
        <img src="images/2.png" class="mini-logo" alt="จิจะเฮงเฮง">
        <div>
            <div class="mini-title">🥢 อาหารจานเดี่ยว</div>
            <div class="mini-sub">เลือกเมนูของคุณ</div>
        </div>
    </div>

    <div class="t-container">
        <div class="t-grid">
            <div class="t-card" onclick="openOptions('s1', 'สุกี้แห้งวุ้นเส้นไข่ข้น', 59, 'suki')">
                <img src="images/suki-S.png" class="t-card-img">
                <div class="t-card-body"><div class="t-card-name">สุกี้แห้งวุ้นเส้นไข่ข้น</div><div class="t-card-price">59.-</div></div>
            </div>
            <div class="t-card" onclick="openOptions('s2', 'สุกี้ x หมูนุ่ม', 69, 'suki')">
                <img src="images/suki2.jpg" class="t-card-img">
                <div class="t-card-body"><div class="t-card-name">สุกี้วุ้นเส้นไข่ข้น x หมูนุ่ม</div><div class="t-card-price">69.-</div></div>
            </div>
            <div class="t-card" onclick="openOptions('s3', 'สุกี้ x หมูนุ่ม ใส่ผัก', 69, 'suki')">
                <img src="images/suki3.jpg" class="t-card-img">
                <div class="t-card-body"><div class="t-card-name">สุกี้วุ้นเส้นไข่ข้น x หมูนุ่ม ใส่ผัก</div><div class="t-card-price">69.-</div></div>
            </div>
            <div class="t-card" onclick="openOptions('s4', 'สุกี้ x หมูนุ่ม x หมึกกรอบ', 79, 'suki')">
                <img src="images/suki-xl.png" class="t-card-img">
                <div class="t-card-body"><div class="t-card-name">สุกี้ไข่ข้น x หมูนุ่ม x หมึกกรอบ</div><div class="t-card-price">79.-</div></div>
            </div>
            <div class="t-card" onclick="openOptions('n1', 'หมี่ไก่ฉีก', 50, 'noodle')">
                <img src="images/mhee-kai.png" class="t-card-img">
                <div class="t-card-body"><div class="t-card-name">หมี่ไก่ฉีก</div><div class="t-card-price">50.-</div></div>
            </div>
        </div>
    </div>

    <div id="optModal" class="t-modal" onclick="if(event.target == this) closeModal()">
        <div class="t-modal-sheet">
            <h3 id="modalTitle" class="t-modal-title">ชื่อเมนู</h3>
            <div id="optionList"></div>
            <button class="t-btn-primary" style="width:100%; margin-top:6px;" onclick="addToCart()">เพิ่มลงตะกร้า - <span id="tempPrice">0</span>.-</button>
            <button onclick="closeModal()" class="t-btn-ghost" style="width:100%; margin-top:10px;">ยกเลิก</button>
        </div>
    </div>

    <a href="summary.html" id="fabCart" class="t-fab-cart">
        <b id="fabTotal">0</b>
        <span id="fabCount">0 รายการ</span>
    </a>

    <script>
        let currentItem = {};
        let cart = JSON.parse(sessionStorage.getItem('cartItems') || '[]');

        function openOptions(id, name, price, type) {
            currentItem = { id, name, price, options: [], type: type, eggQty: 0, addonQty: 0, sukiType: '' };
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('tempPrice').innerText = price;
            
            const list = document.getElementById('optionList');
            list.innerHTML = '';

            if(type === 'suki') {
                list.innerHTML += `
                    <div class="opt-row" style="flex-direction:column; align-items:flex-start;">
                        <div style="font-weight:600; margin-bottom:5px;">* เลือกสูตรสุกี้:</div>
                        <div style="display:flex; gap:15px;">
                            <label><input type="radio" name="sukiType" value="สุกี้กวางตุ้ง" onchange="currentItem.sukiType=this.value"> สุกี้กวางตุ้ง</label>
                            <label><input type="radio" name="sukiType" value="สุกี้เต้าหู้ยี้" onchange="currentItem.sukiType=this.value"> สุกี้เต้าหู้ยี้</label>
                        </div>
                    </div>`;

                list.innerHTML += `
                    <div class="opt-row">
                        <div>
                            <span>+ ไข่ไก่</span><br>
                            <small style="color:#888">(+10.- ต่อฟอง)</small>
                        </div>
                        <div class="addon-counter">
                            <div class="btn-round" onclick="updateEggCount(-1)">-</div>
                            <span id="eggQty" style="font-weight:600; min-width:20px; text-align:center">0</span>
                            <div class="btn-round" onclick="updateEggCount(1)">+</div>
                        </div>
                    </div>`;

                const sukiOpts = [{n:'+ชีสอาบ', p:20}, {n:'+หมูหมักนุ่ม', p:10}];
                if(id === 's4') sukiOpts.push({n:'🪷ไม่ใส่ผัก', p:0});

                sukiOpts.forEach(opt => {
                    list.innerHTML += `
                        <label class="opt-row">
                            <span>${opt.n} (+${opt.p}.-)</span>
                            <input type="checkbox" style="width:20px; height:20px; accent-color:var(--primary-red)" 
                                   onchange="updateSukiOpt('${opt.n}', ${opt.p}, this)">
                        </label>`;
                });
            } else {
                list.innerHTML = `
                    <div class="opt-row">
                        <div>
                            <span>น้ำพริกกากหมู</span><br>
                            <small style="color:#888">(+10.- ต่อห่อ)</small>
                        </div>
                        <div class="addon-counter">
                            <div class="btn-round" onclick="updateAddonCount(-1)">-</div>
                            <span id="addonQty" style="font-weight:600; min-width:20px; text-align:center">0</span>
                            <div class="btn-round" onclick="updateAddonCount(1)">+</div>
                        </div>
                    </div>`;
            }
            document.getElementById('optModal').style.display = 'flex';
        }

        function updateSukiOpt(name, price, chk) {
            if(chk.checked) {
                currentItem.options.push({n: name, p: price});
            } else {
                currentItem.options = currentItem.options.filter(o => o.n !== name);
            }
            updateTotalPrice();
        }

        function updateEggCount(change) {
            if(currentItem.eggQty + change < 0) return;
            currentItem.eggQty += change;
            document.getElementById('eggQty').innerText = currentItem.eggQty;
            updateTotalPrice();
        }

        function updateAddonCount(change) {
            if(currentItem.addonQty + change < 0) return;
            currentItem.addonQty += change;
            document.getElementById('addonQty').innerText = currentItem.addonQty;
            updateTotalPrice();
        }

        function updateTotalPrice() {
            let total = currentItem.price;
            if(currentItem.type === 'suki') {
                total += (currentItem.eggQty * 10);
                currentItem.options.forEach(opt => total += opt.p);
            } else {
                total += (currentItem.addonQty * 10);
            }
            document.getElementById('tempPrice').innerText = total;
        }

        function addToCart() {
            if (currentItem.type === 'suki' && !currentItem.sukiType) {
                alert('กรุณาเลือกสูตรสุกี้ก่อนครับ');
                return;
            }

            const finalPrice = parseInt(document.getElementById('tempPrice').innerText);
            let details = [];

            if (currentItem.type === 'suki') {
                details.push({ name: `${currentItem.name} (${currentItem.sukiType})`, price: currentItem.price, count: 1, type: 'Main' });
                if(currentItem.eggQty > 0) {
                    details.push({ name: "ไข่ไก่", price: 10, count: currentItem.eggQty, type: 'Addon' });
                }
                currentItem.options.forEach(opt => {
                    details.push({ name: opt.n, price: opt.p, count: 1, type: 'Addon' });
                });
            } else {
                details.push({ name: "หมี่ไก่ฉีก", price: 50, count: 1, type: 'Main' });
                if (currentItem.addonQty > 0) {
                    details.push({ name: "น้ำพริกกากหมู", price: 10, count: currentItem.addonQty, type: 'Addon' });
                }
            }
            
            let extraName = currentItem.type === 'suki' ? ` [${currentItem.sukiType}]` : "";
            if(currentItem.type === 'suki' && currentItem.eggQty > 0) extraName += ` (+ไข่ ${currentItem.eggQty} ฟอง)`;
            if(currentItem.type === 'noodle' && currentItem.addonQty > 0) extraName = ` (+น้ำพริก ${currentItem.addonQty} ห่อ)`;

            const newOrder = {
                name: currentItem.name + extraName,
                price: finalPrice,
                count: 1,
                details: details,
                isSukiSet: currentItem.type === 'suki',
                isNoodleSet: currentItem.type === 'noodle'
            };

            cart.push(newOrder);
            sessionStorage.setItem('cartItems', JSON.stringify(cart));
            updateUI();
            closeModal();
        }

        function updateUI() {
            if(cart.length > 0) {
                document.getElementById('fabCart').style.display = 'flex';
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('fabTotal').innerText = total;
                document.getElementById('fabCount').innerText = cart.length + ' รายการ';
            }
        }

        function closeModal() { document.getElementById('optModal').style.display = 'none'; }
        updateUI();
    </script>
</body>
</html>
