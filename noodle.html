<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เมนูเส้น - สั่งอาหาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-red: #940109; --bg-cream: #f1e9d9; --card-white: #ffffff; --text-main: #333; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-cream); margin: 0; padding-bottom: 100px; color: var(--text-main); }
        .header { background-color: var(--primary-red); color: var(--bg-cream); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 5px; }
        .menu-card { background: var(--card-white); border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: #eee; }
        .item-info { padding: 10px; flex-grow: 1; }
        .item-name { font-size: 0.9rem; font-weight: 500; line-height: 1.2; margin-bottom: 5px; min-height: 2.4em; }
        .item-price { color: var(--primary-red); font-weight: 600; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .addon-counter { display: flex; align-items: center; gap: 12px; }
        .btn-round { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--primary-red); background: #fff; color: var(--primary-red); font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-confirm { background: var(--primary-red); color: var(--bg-cream); width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; margin-top: 15px; }
        /* สไตล์เพิ่มเติมสำหรับน้ำจิ้ม */
        .sauce-group { display: flex; gap: 10px; margin: 10px 0; }
        .sauce-option { flex: 1; padding: 10px; border: 2px solid var(--primary-red); border-radius: 8px; text-align: center; cursor: pointer; color: var(--primary-red); }
        .sauce-option.active { background-color: var(--primary-red); color: white; }
        .fab-cart { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: var(--primary-red); color: var(--bg-cream); border-radius: 50%; display: none; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-decoration: none; z-index: 900; border: 2px solid var(--bg-cream); }
        .fab-cart b { font-size: 1.1rem; }
        .fab-cart span { font-size: 0.6rem; }
    </style>
</head>
<body>
    <div class="header"><h2 style="margin:0">🥢 เลือกเมนูของคุณ</h2></div>
    <div class="container">
        <div class="menu-grid">
            <div class="menu-card" onclick="openOptions('s1', 'สุกี้แห้งวุ้นเส้นไข่ข้น', 59, 'suki')"><img src="images/suki-S.png" class="item-img"><div class="item-info"><div class="item-name">สุกี้แห้งวุ้นเส้นไข่ข้น</div><div class="item-price">59.-</div></div></div>
            <div class="menu-card" onclick="openOptions('s2', 'สุกี้ x หมูนุ่ม', 69, 'suki')"><img src="images/suki2.jpg" class="item-img"><div class="item-info"><div class="item-name">สุกี้วุ้นเส้นไข่ข้น x หมูนุ่ม</div><div class="item-price">69.-</div></div></div>
            <div class="menu-card" onclick="openOptions('s3', 'สุกี้ x หมูนุ่ม ใส่ผัก', 69, 'suki')"><img src="images/suki3.jpg" class="item-img"><div class="item-info"><div class="item-name">สุกี้วุ้นเส้นไข่ข้น x หมูนุ่ม ใส่ผัก</div><div class="item-price">69.-</div></div></div>
            <div class="menu-card" onclick="openOptions('s4', 'สุกี้ x หมูนุ่ม x หมึกกรอบ', 79, 'suki')"><img src="images/suki-xl.png" class="item-img"><div class="item-info"><div class="item-name">สุกี้ไข่ข้น x หมูนุ่ม x หมึกกรอบ</div><div class="item-price">79.-</div></div></div>
            <div class="menu-card" onclick="openOptions('n1', 'หมี่ไก่ฉีก', 50, 'noodle')"><img src="images/mhee-kai.png" class="item-img"><div class="item-info"><div class="item-name">หมี่ไก่ฉีก</div><div class="item-price">50.-</div></div></div>
            <div class="menu-card" onclick="openOptions('n2', 'หมี่ไก่ฉีก พิเศษ เส้นxไก่', 79, 'noodle')"><img src="images/79.png" class="item-img"><div class="item-info"><div class="item-name">หมี่ไก่ฉีก พิเศษ เส้นxไก่</div><div class="item-price">79.-</div></div></div>
        </div>
    </div>

    <div id="optModal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0">ชื่อเมนู</h3>
            <div id="optionList"></div>
            <button class="btn-confirm" onclick="addToCart()">เพิ่มลงตะกร้า - <span id="tempPrice">0</span>.-</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">ยกเลิก</button>
        </div>
    </div>

    <a href="summary.html" id="fabCart" class="fab-cart"><b id="fabTotal">0</b><span id="fabCount">0 รายการ</span></a>

    <script>
        let currentItem = {};
        let cart = JSON.parse(sessionStorage.getItem('cartItems') || '[]');

        function openOptions(id, name, price, type) {
            currentItem = { id, name, price, options: [], type: type, eggQty: 0, addonQty: 0, sauce: 'สูตรกวางตุ้ง' };
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('tempPrice').innerText = price;
            
            const list = document.getElementById('optionList');
            list.innerHTML = '';

            if(type === 'suki') {
 
                list.innerHTML += `<p style="margin:10px 0 5px 0">เลือกสูตรที่คุณต้องการทาน (ฟรี):</p>
                    <div class="sauce-group">
                        <div id="s1_btn" class="sauce-option active" onclick="selectSauce('สูตรกวางตุ้ง')">สูตรกวางตุ้ง</div>
                        <div id="s2_btn" class="sauce-option" onclick="selectSauce('สูตรเต้าหู้ยี้')">สูตรเต้าหู้ยี้</div>
                    </div>`;

                list.innerHTML += `<div class="opt-row"><div><span>+ ไข่ไก่</span><br><small style="color:#888">(+10.- ต่อฟอง)</small></div>
                    <div class="addon-counter"><div class="btn-round" onclick="updateEggCount(-1)">-</div><span id="eggQty" style="font-weight:600; min-width:20px; text-align:center">0</span><div class="btn-round" onclick="updateEggCount(1)">+</div></div></div>`;

                const sukiOpts = [{n:'+ชีสอาบ', p:20}, {n:'+หมูหมักนุ่ม', p:10}];
                if(id === 's4') sukiOpts.push({n:'🪷ไม่ใส่ผัก', p:0});
                sukiOpts.forEach(opt => {
                    list.innerHTML += `<label class="opt-row"><span>${opt.n} (+${opt.p}.-)</span><input type="checkbox" style="width:20px; height:20px; accent-color:var(--primary-red)" onchange="updateSukiOpt('${opt.n}', ${opt.p}, this)"></label>`;
                });
            } else {
                list.innerHTML = `<div class="opt-row"><div><span>น้ำพริกกากหมู</span><br><small style="color:#888">(+10.- ต่อห่อ)</small></div>
                    <div class="addon-counter"><div class="btn-round" onclick="updateAddonCount(-1)">-</div><span id="addonQty" style="font-weight:600; min-width:20px; text-align:center">0</span><div class="btn-round" onclick="updateAddonCount(1)">+</div></div></div>`;
            }
            document.getElementById('optModal').style.display = 'flex';
        }

        function selectSauce(sauce) {
            currentItem.sauce = sauce;
            document.getElementById('s1_btn').className = (sauce === 'สูตรกวางตุ้ง') ? 'sauce-option active' : 'sauce-option';
            document.getElementById('s2_btn').className = (sauce === 'สูตรเต้าหู้ยี้') ? 'sauce-option active' : 'sauce-option';
        }

        function updateSukiOpt(name, price, chk) {
            if(chk.checked) currentItem.options.push({n: name, p: price});
            else currentItem.options = currentItem.options.filter(o => o.n !== name);
            updateTotalPrice();
        }

        function updateEggCount(change) {
            if(currentItem.eggQty + change < 0) return;
            currentItem.eggQty += change;
            document.getElementById('eggQty').innerText = currentItem.eggQty;
            updateTotalPrice();
        }

        function updateAddonCount(change) {
            if(currentItem.addonQty + change < 0) return;
            currentItem.addonQty += change;
            document.getElementById('addonQty').innerText = currentItem.addonQty;
            updateTotalPrice();
        }

        function updateTotalPrice() {
            let total = currentItem.price;
            if(currentItem.type === 'suki') {
                total += (currentItem.eggQty * 10);
                currentItem.options.forEach(opt => total += opt.p);
            } else {
                total += (currentItem.addonQty * 10);
            }
            document.getElementById('tempPrice').innerText = total;
        }

        function addToCart() {
            let extraName = "";
            if(currentItem.type === 'suki') {
                extraName = ` (${currentItem.sauce})`;
                if(currentItem.eggQty > 0) extraName += ` (+ไข่ ${currentItem.eggQty})`;
            } else if(currentItem.type === 'noodle' && currentItem.addonQty > 0) {
                extraName = ` (+น้ำพริก ${currentItem.addonQty})`;
            }

            const newOrder = {
                name: currentItem.name + extraName,
                price: parseInt(document.getElementById('tempPrice').innerText),
                count: 1
            };

            cart.push(newOrder);
            sessionStorage.setItem('cartItems', JSON.stringify(cart));
            updateUI();
            closeModal();
        }

        function updateUI() {
            if(cart.length > 0) {
                document.getElementById('fabCart').style.display = 'flex';
                document.getElementById('fabTotal').innerText = cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('fabCount').innerText = cart.length + ' รายการ';
            }
        }
        function closeModal() { document.getElementById('optModal').style.display = 'none'; }
        updateUI();
    </script>
</body>
</html>
